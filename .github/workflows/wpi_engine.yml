name: WPI Quantitative Sports Engine

on:
  schedule:
    - cron: '0 9 * * *' # Executes daily at 09:00 AM UTC
  workflow_dispatch: # Allows manual execution via GitHub UI

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Core Packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests pandas tabulate

      - name: Execute WPI Simulation Engine
        run: python wpi_core_engine.py
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }} # Store your free API key in GitHub Secrets

      - name: Commit Daily Alpha Report
        run: |
          git config --global user.name "WPI-Bot"
          git config --global user.email "wpi-bot@github.com"
          git add Reports/
          git commit -m "WPI Engine Automated Board Run: $(date +'%Y-%m-%d')" || exit 0
          git push
