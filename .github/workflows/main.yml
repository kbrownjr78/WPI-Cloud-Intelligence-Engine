name: WPI Free Automated Cloud Scraper and Engine

on:
  schedule:
    - cron: '0 07 * * *' # Triggers automatically every single day at 7:00 AM UTC (7:00 AM ET)
  workflow_dispatch: # Enables manual one-click execution from your GitHub Actions tab interface

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest # Provisions a clean Linux virtual machine container in the cloud

    permissions:
      contents: write # Crucial: Grants the cloud server permission to update your repo files

    steps:
      # Step 1: Clone your repository files from the GitHub cloud onto the virtual server
      - name: Checkout Repository Workspace
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Retains core security tokens to prevent Git 128 push errors

      # Step 2: Provision a clean Python 3.10 architecture on the virtual machine
      - name: Set Up Cloud Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches installed packages to optimize daily execution speed

      # Step 3: Install your complete numerical analysis and web-scraping stack
      - name: Install Python Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy selenium webdriver-manager pandas beautifulsoup4

      # Step 4: Execute your script to scrape today's games for free and run the 100,000-loop simulations
      - name: Run Scraper and Compute Monte Carlo Model
        run: python automated_pipeline.py

      # Step 5: Use internal Git commands to push the updated 'alpha_market_matrix.csv' back to your repo
      - name: Commit Generated Alpha Matrix to GitHub Repository
        run: |
          git config --global user.name "WPI Quant Bot"
          git config --global user.email "quant-bot@github.com"
          git add alpha_market_matrix.csv
          # Safely logs updates; skips execution loop if data tracks identically to yesterday to save runner minutes
          git commit -m "Data Engine Synchronization: Updated Real-Time Alpha Projections [skip ci]" || echo "No pipeline matrix changes detected."
          git push
