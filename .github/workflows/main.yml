name: WPI Free Automated Cloud Scraper and Engine

on:
  schedule:
    - cron: '0 11 * * *' # Automated execution loop fires daily at 11:00 AM UTC (7:00 AM ET)
  workflow_dispatch: # Preserves manual one-click trigger capacity within your GitHub Actions tab

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest # Allocates a clean, modern Linux virtual machine container in the cloud

    permissions:
      contents: write # Crucial: Authorizes the cloud server to append rows back to your repo CSV file

    steps:
      # Step 1: Clone your repository files from the GitHub cloud onto the virtual engine runner
      - name: Checkout Repository Workspace
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Retains core security tokens to prevent Git push 128 error blocks

      # Step 2: Provision a clean Python 3.10 environmental shell on the virtual machine
      - name: Set Up Cloud Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches global package libraries to maximize daily execution speeds

      # Step 3: Install streamlined scientific packages (No visual browser components required)
      - name: Install Python Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas requests

      # Step 4: Execute the multi-sport text schedule parser and fire 100,000 Monte Carlo loops
      - name: Run Ingestion and Compute Monte Carlo Engine
        run: python automated_pipeline.py

      # Step 5: Securely append today's new simulation matrix rows to your repository spreadsheet tracker
      - name: Commit Generated Alpha Matrix to GitHub Repository
        run: |
          git config --global user.name "WPI Quant Bot"
          git config --global user.email "quant-bot@github.com"
          git add alpha_market_matrix.csv
          # Appends data smoothly; avoids action failures if today's slate metrics calculate identically to yesterday
          git commit -m "Data Engine Synchronization: Appended TheSportsDB Projections [skip ci]" || echo "No pipeline matrix changes detected."
          git push
