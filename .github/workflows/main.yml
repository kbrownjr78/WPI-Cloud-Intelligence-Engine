name: WPI Free Automated Cloud Scraper and Engine

on:
  schedule:
    - cron: '0 13 * * *' # Automated execution loop fires daily at 1:00 PM UTC (8:00 AM ET)
  workflow_dispatch: # Preserves manual one-click trigger capacity within GitHub Actions UI

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest # Allocates a free Linux cloud container workspace node

    permissions:
      contents: write # Mandatory: Authorizes the server container to append rows back to your repo

    steps:
      # Step 1: Clone your repository files from the cloud onto the virtual engine runner
      - name: Checkout Repository Workspace
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Retains workspace token permissions to prevent Git push 128 blocks

      # Step 2: Provision a clean Python 3.10 development runner runtime environmental shell
      - name: Set Up Cloud Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches global package libraries to maximize computation speeds

      # Step 3: Install streamlined scientific packages (No visual browser dependencies required)
      - name: Install Python Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas requests

      # Step 4: Execute the multi-sport plain text schedule parser and fire 100,000 Monte Carlo loops
      - name: Run Scraper and Compute Monte Carlo Model
        run: python automated_pipeline.py

      # Step 5: Securely append today's new simulation matrix rows to your repository spreadsheet tracker
      - name: Commit Generated Alpha Matrix to GitHub Repository
        run: |
          git config --global user.name "WPI Quant Bot"
          git config --global user.email "quant-bot@github.com"
          git add alpha_market_matrix.csv
          # Appends data smoothly; avoids action failures if today's slate metrics calculate identically to yesterday
          git commit -m "Data Engine Synchronization: Appended Plain-Text Projections [skip ci]" || echo "No pipeline matrix changes detected."
          git push
